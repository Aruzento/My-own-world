<!DOCTYPE html> <!-- Объявляет HTML5-документ -->

<html lang="ru"> <!-- Корневой HTML-элемент, язык страницы русский -->
  <head> <!-- Служебная часть документа -->

    <meta charset="UTF-8" /> <!-- Кодировка UTF-8 для русского текста -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" /> <!-- Адаптация масштаба под ширину устройства -->

    <title>MyOwnWorld</title> <!-- Название вкладки браузера -->

    <link rel="stylesheet" href="./styles/main.css"> <!-- Подключает главный CSS-файл, который импортирует остальные стили -->
  </head>
  <body> <!-- Видимая часть приложения -->
    <div class="app" data-app-shell-poc="0.0.1.8.5" data-ui-foundation="0.0.1.8.7" data-app-shell-migration="0.0.1.8.10" data-core-content-migration="0.0.1.8.11.6" data-app-shell-mode="tree" data-sidebar-state="expanded" data-right-panel-state="hidden"> <!-- Главный layout-контейнер приложения: sidebar + editor -->

      <header class="app-topbar" data-app-shell-zone="title-context-bar">
        <div class="app-topbar-context">
          <span class="app-topbar-brand">MyOwnWorld</span>
          <span class="app-topbar-context-divider"></span>
          <span class="app-topbar-section" id="appTopbarModeLabel">Дерево</span>
        </div>

        <div class="app-topbar-actions">
          <button id="appSettingsBtn" class="app-topbar-btn" type="button" title="Настройки" data-tooltip="Настройки" data-tooltip-placement="bottom" aria-label="Настройки" aria-haspopup="dialog" aria-expanded="false" aria-controls="appSettingsPopup">
            <svg class="app-icon" viewBox="0 0 24 24" aria-hidden="true">
              <use href="./assets/icons/rpg-ui.svg#icon-settings"></use>
            </svg>
          </button>

          <button id="appToolsBtn" class="app-topbar-btn" type="button" title="Инструменты" data-tooltip="Инструменты" data-tooltip-placement="bottom" aria-label="Инструменты" aria-haspopup="dialog" aria-expanded="false" aria-controls="appToolsPopup">
            <svg class="app-icon" viewBox="0 0 24 24" aria-hidden="true">
              <use href="./assets/icons/rpg-ui.svg#icon-tools"></use>
            </svg>
          </button>
        </div>
      </header>

      <nav class="app-nav-rail" data-app-shell-zone="nav-rail" aria-label="Навигация workspace">
        <div class="app-nav-rail-main">
          <button id="appTreeRailBtn" class="app-nav-item is-active" type="button" data-shell-tab="tree" title="Скрыть дерево" data-tooltip="Скрыть дерево" data-tooltip-placement="right" aria-label="Скрыть дерево" aria-controls="primarySidebar" aria-expanded="true" aria-pressed="true">
            <svg class="app-icon" viewBox="0 0 24 24" aria-hidden="true">
              <use href="./assets/icons/rpg-ui.svg#icon-folder-open"></use>
            </svg>
          </button>
        </div>

        <div class="app-nav-rail-bottom">
          <button
            class="profile-button rail-profile-button"
            id="profileButton"
            type="button"
            title="Профиль"
            data-tooltip="Профиль"
            data-tooltip-placement="right"
            aria-label="Профиль"
            aria-haspopup="dialog"
          >
            <span class="profile-avatar">
              <img class="profile-image" alt="">
              <span class="profile-avatar-fallback">U</span>
            </span>

            <span class="profile-text">
              <span class="profile-name">{user.name}</span>
              <span class="profile-tarif">{user.tarif}</span>
            </span>
          </button>
        </div>
      </nav>


      <!-- SIDEBAR -->
      <aside id="primarySidebar" class="sidebar" data-app-shell-zone="primary-sidebar" aria-label="Навигация workspace"> <!-- Левая боковая панель -->
        <div class="search-wrapper" data-core-content-zone="tree-search"> <!-- Контейнер поиска -->
          <svg class="app-icon search-wrapper-icon" viewBox="0 0 24 24" aria-hidden="true">
            <use href="./assets/icons/rpg-ui.svg#icon-search"></use>
          </svg>
          <input id="searchInput" placeholder="Поиск..."/> <!-- Поле поиска по страницам -->
        </div>

        <div class="tree" id="tree" data-core-content-zone="world-tree">

        </div> <!-- Контейнер дерева страниц -->

      </aside>

      <div id="appSidebarResizeHandle" class="app-sidebar-resize-handle" role="separator" aria-label="Изменить ширину sidebar" aria-orientation="vertical" aria-valuemin="220" aria-valuemax="380" aria-valuenow="270" tabindex="0"></div>

      
      <!-- MAIN EDITOR -->
      <main class="editor" data-app-shell-zone="workspace"> <!-- Правая основная область редактора -->

        <!-- FLOATING TOOLBAR -->
        <div class="floating-toolbar hidden" id="floatingToolbar" role="toolbar" aria-label="Форматирование текста" data-core-content-zone="editor-format-toolbar"> <!-- Плавающая панель форматирования текста -->
          
          <button data-command="bold" title="Жирный">
            B
          </button> <!-- Кнопка жирного текста через formattingService -->

          <button data-command="italic" title="Курсив">
            I
          </button> <!-- Кнопка курсива через formattingService -->

          <button data-command="underline" title="Подчёркнутый">
            U
          </button> <!-- Кнопка подчёркивания через formattingService -->

          <div class="toolbar-separator">
          </div> <!-- Визуальный разделитель toolbar -->

          <button data-block="p" title="Обычный текст">
            T
          </button> <!-- Преобразует выбранный блок в обычный текст -->

          <button data-block="h1" title="Заголовок 1">
            H1
          </button> <!-- Преобразует выбранный блок в H1 -->

          <button data-block="h2" title="Заголовок 2">
            H2
          </button> <!-- Преобразует выбранный блок в H2 -->

          <button data-block="h3" title="Заголовок 3">
            H3
          </button> <!-- Преобразует выбранный блок в H3 -->

          <button data-block="h4" title="Заголовок 4">
            H4
          </button> <!-- Преобразует выбранный блок в H4 -->

          <div class="toolbar-separator">
          </div> <!-- Визуальный разделитель toolbar -->

          <button data-command="insertUnorderedList" title="Маркированный список">
            •
          </button> <!-- Создаёт маркированный список через formattingService -->

          <button data-command="insertOrderedList" title="Нумерованный список">
            1.
          </button> <!-- Создаёт нумерованный список через formattingService -->

          <button data-action="link" title="Добавить ссылку">
            <svg class="app-icon" viewBox="0 0 24 24" aria-hidden="true">
              <use href="./assets/icons/rpg-ui.svg#icon-link"></use>
            </svg>
          </button> <!-- Открывает popup создания обычной ссылки -->

          <div class="toolbar-separator">
          </div> <!-- Визуальный разделитель toolbar -->

          <button data-action="clear-format" title="Сбросить формат">
            Tx
          </button> <!-- Сбрасывает inline-форматирование выделения -->

          <div class="toolbar-separator">
          </div> <!-- Визуальный разделитель toolbar -->

          <button data-action="color-popup" class="toolbar-color-button" id="toolbarColorButton" title="Цвет текста">
            <span class="toolbar-color-button-swatch"></span>
          </button> <!-- Открывает popup выбора цвета -->

          <div class="toolbar-color-popup hidden" id="toolbarColorPopup" data-runtime="true">
            <input type="color" id="textColorPicker" title="Цвет текста"> <!-- Выбор цвета текста -->

            <div class="toolbar-recent-colors" id="toolbarRecentColors" aria-label="Последние цвета">
            </div> <!-- Последние использованные цвета -->

            <button data-action="apply-color" class="toolbar-apply-color" title="Применить выбранный цвет">
              Принять
            </button> <!-- Применяет текущий выбранный цвет -->
          </div>
        </div>
        
        <!-- DOCUMENT SURFACE -->
        <div class="editor-surface"> <!-- Скроллируемая поверхность редактора -->
          <div id="editorArea">
          </div> <!-- Основной контейнер, куда вставляется HTML текущей карточки -->
        </div>

        <!-- STATUSBAR -->
        <div class="statusbar" id="statusbar" data-app-shell-zone="status-bar">
          Готово
        </div> <!-- Нижняя строка статуса -->
      </main>

      <aside id="appRightPanel" class="app-right-panel hidden" data-app-shell-zone="right-panel" aria-label="Правая панель" aria-hidden="true"></aside>
    </div>

    <div id="appSettingsPopup" class="app-settings-popup hidden ui-panel" data-runtime="true" data-overlay-kind="popover" data-overlay-owner="app-topbar" data-overlay-lifecycle="popup-manager" data-overlay-state="closed" role="dialog" aria-modal="false" aria-label="Настройки приложения">
      <button id="appSettingsCloseBtn" class="app-popup-close" type="button" title="Закрыть">
        <svg class="app-icon" viewBox="0 0 24 24" aria-hidden="true">
          <use href="./assets/icons/rpg-ui.svg#icon-x"></use>
        </svg>
      </button>
    </div>

    <div id="appToolsPopup" class="app-tools-popup hidden ui-panel" data-runtime="true" data-overlay-kind="popover" data-overlay-owner="app-topbar" data-overlay-lifecycle="popup-manager" data-overlay-state="closed" role="dialog" aria-modal="false" aria-label="Инструменты">
      <button class="mow-button mow-tools-action" data-variant="ghost" type="button" data-onboarding-open="quickstart">Быстрый старт</button>
      <button class="mow-button mow-tools-action" data-variant="ghost" type="button" data-onboarding-open="product">Как устроено</button>
      <button class="mow-button mow-tools-action" data-variant="ghost" type="button" data-onboarding-open="checklist">Checklist</button>
    </div>

    <div id="onboardingPopup" class="onboarding-popup hidden ui-panel" data-runtime="true">
      <div class="onboarding-popup-header">
        <div>
          <div class="onboarding-popup-kicker">Помощь</div>
          <h2 id="onboardingTitle">Быстрый старт</h2>
        </div>

        <button id="onboardingCloseBtn" class="app-popup-close" type="button" title="Закрыть">
          <svg class="app-icon" viewBox="0 0 24 24" aria-hidden="true">
            <use href="./assets/icons/rpg-ui.svg#icon-x"></use>
          </svg>
        </button>
      </div>

      <div id="onboardingBody" class="onboarding-popup-body"></div>
    </div>

    <div id="linkPopup" class="link-popup hidden"> <!-- Popup создания обычной внешней ссылки -->

      <input id="linkTextInput" type="text" placeholder="Текст ссылки"> <!-- Поле текста ссылки -->
      <input id="linkUrlInput" type="text" placeholder="Введите ссылку"> <!-- Поле URL ссылки -->

      <div class="link-popup-actions"> <!-- Кнопки popup ссылки -->
        <button id="cancelLinkBtn" type="button">
          Отмена
        </button> <!-- Закрывает popup без создания ссылки -->

        <button id="applyLinkBtn" type="button">
          Создать
        </button> <!-- Создаёт ссылку из выбранного текста -->
      </div>
    </div>

    <script type="module" src="./js/app.js">
    </script> <!-- Главная точка входа JS-приложения -->
  </body>
</html>
