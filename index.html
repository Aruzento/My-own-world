<!DOCTYPE html> <!-- Объявляет HTML5-документ -->

<html lang="ru"> <!-- Корневой HTML-элемент, язык страницы русский -->
  <head> <!-- Служебная часть документа -->

    <meta charset="UTF-8" /> <!-- Кодировка UTF-8 для русского текста -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" /> <!-- Адаптация масштаба под ширину устройства -->

    <title>MyOwnWorld</title> <!-- Название вкладки браузера -->

    <link rel="stylesheet" href="./styles/main.css"> <!-- Подключает главный CSS-файл, который импортирует остальные стили -->
  </head>
  <body> <!-- Видимая часть приложения -->
    <div class="app"> <!-- Главный layout-контейнер приложения: sidebar + editor -->

      <header class="app-topbar">
        <div class="app-topbar-spacer"></div>

        <div class="app-topbar-actions">
          <button id="appSettingsBtn" class="app-topbar-btn" type="button" title="Настройки">
            <svg class="app-icon" viewBox="0 0 24 24" aria-hidden="true">
              <use href="./assets/icons/rpg-ui.svg#icon-settings"></use>
            </svg>
          </button>

          <button id="appToolsBtn" class="app-topbar-btn" type="button" title="Инструменты">
            <svg class="app-icon" viewBox="0 0 24 24" aria-hidden="true">
              <use href="./assets/icons/rpg-ui.svg#icon-tools"></use>
            </svg>
          </button>
        </div>
      </header>


      <!-- SIDEBAR -->
      <aside class="sidebar"> <!-- Левая боковая панель -->
        <div class="sidebar-header"> <!-- Верхняя часть sidebar -->
          
          <div class="sidebar-title">
            MyWorld
          </div> <!-- Название приложения -->
          
          <div class="sidebar-actions"> <!-- Кнопки действий в sidebar -->
            
            <button id="openWorkspaceBtn" class="icon-btn" title="Workspace" >
              <svg class="app-icon" viewBox="0 0 24 24" aria-hidden="true">
                <use href="./assets/icons/rpg-ui.svg#icon-folder-open"></use>
              </svg>
            </button> <!-- Кнопка выбора/открытия рабочей папки -->

            <button id="newPageBtn" class="icon-btn" title="Новая страница">
              <svg class="app-icon" viewBox="0 0 24 24" aria-hidden="true">
                <use href="./assets/icons/rpg-ui.svg#icon-plus"></use>
              </svg>
            </button> <!-- Кнопка открытия меню создания новой карточки -->
          
          </div> <!-- Кнопки действий в sidebar -->
        </div> <!-- Верхняя часть sidebar -->
        
        <div class="search-wrapper"> <!-- Контейнер поиска -->
          <input id="searchInput" placeholder="Поиск..."/> <!-- Поле поиска по страницам -->
        </div>
        
        <div class="tree" id="tree">

        </div> <!-- Контейнер дерева страниц -->

        <div class="sidebar-profile">
          <button
            class="profile-button"
            id="profileButton"
            type="button"
          >
            <span class="profile-avatar">
              <img class="profile-image" alt="">
              <span class="profile-avatar-fallback">U</span>
            </span>

            <span class="profile-text">
              <span class="profile-name">{user.name}</span>
              <span class="profile-tarif">{user.tarif}</span>
            </span>
          </button>
        </div>
      </aside>

      
      <!-- MAIN EDITOR -->
      <main class="editor"> <!-- Правая основная область редактора -->

        <!-- FLOATING TOOLBAR -->
        <div class="floating-toolbar hidden" id="floatingToolbar"> <!-- Плавающая панель форматирования текста -->
          
          <button data-command="bold" title="Жирный">
            B
          </button> <!-- Кнопка жирного текста через formattingService -->

          <button data-command="italic" title="Курсив">
            I
          </button> <!-- Кнопка курсива через formattingService -->

          <button data-command="underline" title="Подчёркнутый">
            U
          </button> <!-- Кнопка подчёркивания через formattingService -->

          <div class="toolbar-separator">
          </div> <!-- Визуальный разделитель toolbar -->

          <button data-block="p" title="Обычный текст">
            T
          </button> <!-- Преобразует выбранный блок в обычный текст -->

          <button data-block="h1" title="Заголовок 1">
            H1
          </button> <!-- Преобразует выбранный блок в H1 -->

          <button data-block="h2" title="Заголовок 2">
            H2
          </button> <!-- Преобразует выбранный блок в H2 -->

          <button data-block="h3" title="Заголовок 3">
            H3
          </button> <!-- Преобразует выбранный блок в H3 -->

          <button data-block="h4" title="Заголовок 4">
            H4
          </button> <!-- Преобразует выбранный блок в H4 -->

          <div class="toolbar-separator">
          </div> <!-- Визуальный разделитель toolbar -->

          <button data-command="insertUnorderedList" title="Маркированный список">
            •
          </button> <!-- Создаёт маркированный список через formattingService -->

          <button data-command="insertOrderedList" title="Нумерованный список">
            1.
          </button> <!-- Создаёт нумерованный список через formattingService -->

          <button data-action="link" title="Добавить ссылку">
            <svg class="app-icon" viewBox="0 0 24 24" aria-hidden="true">
              <use href="./assets/icons/rpg-ui.svg#icon-link"></use>
            </svg>
          </button> <!-- Открывает popup создания обычной ссылки -->

          <div class="toolbar-separator">
          </div> <!-- Визуальный разделитель toolbar -->

          <button data-action="clear-format" title="Сбросить формат">
            Tx
          </button> <!-- Сбрасывает inline-форматирование выделения -->

          <div class="toolbar-separator">
          </div> <!-- Визуальный разделитель toolbar -->

          <button data-action="color-popup" class="toolbar-color-button" id="toolbarColorButton" title="Цвет текста">
            <span class="toolbar-color-button-swatch"></span>
          </button> <!-- Открывает popup выбора цвета -->

          <div class="toolbar-color-popup hidden" id="toolbarColorPopup" data-runtime="true">
            <input type="color" id="textColorPicker" title="Цвет текста"> <!-- Выбор цвета текста -->

            <div class="toolbar-recent-colors" id="toolbarRecentColors" aria-label="Последние цвета">
            </div> <!-- Последние использованные цвета -->

            <button data-action="apply-color" class="toolbar-apply-color" title="Применить выбранный цвет">
              Принять
            </button> <!-- Применяет текущий выбранный цвет -->
          </div>
        </div>
        
        <!-- DOCUMENT SURFACE -->
        <div class="editor-surface"> <!-- Скроллируемая поверхность редактора -->
          <div id="editorArea">
          </div> <!-- Основной контейнер, куда вставляется HTML текущей карточки -->
        </div>

        <!-- STATUSBAR -->
        <div class="statusbar" id="statusbar">
          Готово
        </div> <!-- Нижняя строка статуса -->
      </main>
    </div>

    <!-- CREATE MENU --> <!-- ПОТЕНЦИАЛЬНО ЛЕГАСИ НАДО ПЕРЕНЕСТИ В JS-->
    <div id="createMenu" class="create-menu hidden">
    </div> <!-- Popup выбора типа новой карточки -->

    <div id="treeContextMenu" class="tree-context-menu hidden">
    </div> <!-- Контекстное меню дерева страниц -->

    <div id="appSettingsPopup" class="app-settings-popup hidden ui-panel" data-runtime="true">
      <button id="appSettingsCloseBtn" class="app-popup-close" type="button" title="Закрыть">
        <svg class="app-icon" viewBox="0 0 24 24" aria-hidden="true">
          <use href="./assets/icons/rpg-ui.svg#icon-x"></use>
        </svg>
      </button>
    </div>

    <div id="appToolsPopup" class="app-tools-popup hidden ui-panel" data-runtime="true">
      <button type="button">Кнопка1</button>
      <button type="button">Кнопка2</button>
      <button type="button">Кнопка3</button>
    </div>

    <div id="linkPopup" class="link-popup hidden"> <!-- Popup создания обычной внешней ссылки -->

      <input id="linkTextInput" type="text" placeholder="Текст ссылки"> <!-- Поле текста ссылки -->
      <input id="linkUrlInput" type="text" placeholder="Введите ссылку"> <!-- Поле URL ссылки -->

      <div class="link-popup-actions"> <!-- Кнопки popup ссылки -->
        <button id="cancelLinkBtn" type="button">
          Отмена
        </button> <!-- Закрывает popup без создания ссылки -->

        <button id="applyLinkBtn" type="button">
          Создать
        </button> <!-- Создаёт ссылку из выбранного текста -->
      </div>
    </div>

    <script type="module" src="./js/app.js">
    </script> <!-- Главная точка входа JS-приложения -->
  </body>
</html>
